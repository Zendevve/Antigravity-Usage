# Crowdin Configuration for K1 Antigravity Monitor
# Documentation: https://support.crowdin.com/configuration-file/
# Translation Quality: https://crowdin.com/page/translation-quality

project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_API_TOKEN

# Preserve directory structure
preserve_hierarchy: true

# Source files configuration
files:
  # Main translation files
  - source: /src/i18n/locales/en.json
    translation: /src/i18n/locales/%two_letters_code%.json
    languages_mapping:
      two_letters_code:
        # Map Crowdin language codes to project locale codes
        pt-BR: pt-BR
        zh-CN: zh-CN
        zh-TW: zh-TW
        nl: nl
        pl: pl
        tr: tr
        sv: sv
        uk: uk
        vi: vi
        th: th
        id: id

  # Exclude source file from translations
    update_option: update_without_changes

# Language mapping for Crowdin
languages:
  - en           # English
  - es           # Spanish
  - fr           # French
  - de           # German
  - ja           # Japanese
  - zh-CN        # Chinese Simplified
  - pt-BR        # Portuguese (Brazil)
  - it           # Italian
  - ko           # Korean
  - ru           # Russian
  - ar           # Arabic
  - hi           # Hindi
  - nl           # Dutch (NEW)
  - pl           # Polish (NEW)
  - tr           # Turkish (NEW)
  - sv           # Swedish (NEW)
  - uk           # Ukrainian (NEW)
  - vi           # Vietnamese (NEW)
  - th           # Thai (NEW)
  - id           # Indonesian (NEW)

# Auto-approve suggestions (for trusted translations)
auto_approve_imported: false

# Export pattern for translations
export_patterns:
  - /%two_letters_code%.json

# Notifications
notifications:
  - notify_crowdin_project_owner_about_pending_review

# Branch configuration
branch: main

# Quality checks (Crowdin Enterprise feature)
# These run automatically on new translations
quality_checks:
  - empty_translation: true
  - max_length: 500
  - placeholders: true
  - double_spaces: true

# Translation memory configuration
tm:
  # Enable translation memory for this project
  enabled: true
  # Apply TM matches above 85% automatically
  apply_tm: 0.85

# Glossary configuration
glossaries:
  - name: "K1 Antigravity Terms"
    # Terms will be managed in Crowdin Glossary
